<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大紅茶帝国 官報｜全業務命令便覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:      #ece2cd;
    --paper-deep: #e0d3b6;
    --ink:        #241d18;
    --ink-soft:   #4a3f36;
    --crimson:    #7c2431;
    --crimson-deep:#4f151d;
    --gold:       #a9822f;
    --gold-soft:  #cfae6b;
    --tea:        #3e2b1c;
    --seal:       #9c2b2b;
    --rule:       rgba(36,29,24,0.18);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 10% -10%, rgba(124,36,49,0.06), transparent 60%),
      radial-gradient(ellipse 900px 600px at 100% 0%, rgba(169,130,47,0.10), transparent 55%),
      var(--paper);
    background-attachment:fixed;
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    line-height:1.75;
  }

  /* 紙のノイズ的な質感 */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    background-image:
      repeating-linear-gradient(0deg, rgba(36,29,24,0.015) 0px, rgba(36,29,24,0.015) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:multiply;
    z-index:0;
  }

  .side-strip{
    position:fixed;
    top:0; left:0; bottom:0;
    width:34px;
    background:linear-gradient(180deg, var(--crimson-deep), var(--crimson) 40%, var(--tea));
    z-index:5;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .side-strip span{
    writing-mode:vertical-rl;
    text-orientation:upright;
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    color:rgba(236,226,205,0.88);
    letter-spacing:0.5em;
    font-size:14px;
    user-select:none;
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width:880px;
    margin:0 auto;
    padding:56px 28px 120px 62px;
  }

  header.masthead{
    position:relative;
    padding-bottom:28px;
    margin-bottom:34px;
    border-bottom:3px double var(--ink);
  }
  .masthead-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:0.06em;
    margin-bottom:18px;
  }
  h1.title{
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    font-size:clamp(30px, 5.4vw, 44px);
    margin:0 0 10px 0;
    color:var(--ink);
    letter-spacing:0.03em;
  }
  h1.title small{
    display:block;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:500;
    font-size:14px;
    color:var(--crimson);
    letter-spacing:0.28em;
    margin-bottom:10px;
  }
  .lede{
    max-width:60ch;
    color:var(--ink-soft);
    font-size:15px;
  }

  .seal{
    position:absolute;
    right:0; top:2px;
    width:86px; height:86px;
    border-radius:50%;
    border:3px solid var(--seal);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:rotate(-8deg);
    opacity:0.9;
  }
  .seal::before{
    content:"";
    position:absolute;
    inset:6px;
    border:1px solid var(--seal);
    border-radius:50%;
  }
  .seal-text{
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    font-size:15px;
    color:var(--seal);
    writing-mode:vertical-rl;
    letter-spacing:0.15em;
  }

  /* 検索 */
  .search-box{
    position:sticky;
    top:16px;
    z-index:4;
    margin-bottom:38px;
    background:var(--paper-deep);
    border:1px solid var(--rule);
    border-left:5px solid var(--crimson);
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 6px 18px rgba(36,29,24,0.08);
  }
  .search-box label{
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    font-size:14px;
    color:var(--crimson-deep);
    white-space:nowrap;
  }
  .search-box input{
    flex:1;
    border:none;
    background:transparent;
    border-bottom:1px solid var(--rule);
    font-family:'JetBrains Mono', monospace;
    font-size:14px;
    padding:6px 4px;
    color:var(--ink);
    outline:none;
  }
  .search-box input:focus{ border-bottom-color:var(--crimson); }
  .search-count{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }

  section.ministry{
    margin-bottom:46px;
  }
  section.ministry.is-empty{ display:none; }

  .ministry-head{
    display:flex;
    align-items:baseline;
    gap:14px;
    margin-bottom:6px;
  }
  .ministry-no{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--gold);
    border:1px solid var(--gold);
    padding:2px 7px;
    border-radius:2px;
  }
  h2.ministry-name{
    font-family:'Shippori Mincho B1', serif;
    font-weight:800;
    font-size:21px;
    margin:0;
    color:var(--crimson-deep);
  }
  .ministry-desc{
    font-size:13.5px;
    color:var(--ink-soft);
    margin:6px 0 18px 0;
    padding-left:1px;
  }

  .cmd-list{ border-top:1px solid var(--rule); }
  .cmd-row{
    display:grid;
    grid-template-columns:220px 1fr;
    gap:18px;
    padding:14px 4px;
    border-bottom:1px solid var(--rule);
  }
  .cmd-row.is-hidden{ display:none; }

  .cmd-name{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:13.5px;
    color:var(--paper);
    background:var(--ink);
    display:inline-block;
    padding:4px 9px;
    border-radius:3px;
    align-self:start;
    white-space:nowrap;
  }
  .cmd-row.restricted .cmd-name{ background:var(--crimson-deep); }

  .cmd-body .cmd-desc{ font-size:14.5px; color:var(--ink); }
  .cmd-body .cmd-example{
    display:block;
    margin-top:4px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
  }
  .badge{
    display:inline-block;
    margin-left:8px;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:10.5px;
    font-weight:700;
    color:var(--crimson-deep);
    background:rgba(124,36,49,0.10);
    border:1px solid rgba(124,36,49,0.35);
    padding:1px 6px;
    border-radius:10px;
    vertical-align:middle;
  }

  @media (max-width:600px){
    .cmd-row{ grid-template-columns:1fr; gap:6px; }
    .wrap{ padding:40px 18px 100px 46px; }
    .seal{ display:none; }
  }

  footer.colophon{
    margin-top:60px;
    padding-top:20px;
    border-top:3px double var(--ink);
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }

  .no-result{
    display:none;
    text-align:center;
    padding:60px 0;
    color:var(--ink-soft);
    font-family:'Shippori Mincho B1', serif;
    font-size:16px;
  }
</style>
</head>
<body>

<div class="side-strip"><span>大紅茶帝国官報・臣民公示便覧</span></div>

<div class="wrap">

  <header class="masthead">
    <div class="masthead-top">
      <span>大紅茶帝国広報局 発行</span>
      <span id="issueDate"></span>
    </div>
    <h1 class="title">
      <small>DAI-KOUCHA TEIKOKU OFFICIAL GAZETTE</small>
      全業務命令便覧
    </h1>
    <p class="lede">
      帝国民が用いる全命令（コマンド）を、担当省庁ごとに分類し公示する。
      検索欄に語句を入力すると該当命令のみ表示される。
      末尾「禁裏」区分は権限保有者（モデレーター・皇帝直属）専用命令である。
    </p>
    <div class="seal"><span class="seal-text">紅茶帝国印</span></div>
  </header>

  <div class="search-box">
    <label>検索</label>
    <input id="searchInput" type="text" placeholder="例：仕事 / relic / カジノ / 給料 …">
    <span class="search-count" id="searchCount"></span>
  </div>

  <div id="ministries"></div>
  <p class="no-result" id="noResult">該当する命令は見当たらぬ。語句を変えて検索されたし。</p>

  <footer class="colophon">
    <span>大紅茶帝国広報局</span>
    <span>本便覧は帝国チャット内命令(コマンド)の公式一覧である</span>
  </footer>

</div>

      { name: "/datamigrate 旧名前 新名前", desc: "旧アカウントのデータを新アカウントへ統合移行する。", restricted:true, ex:"例：/datamigrate 紅茶太郎 紅茶太郎２" },
      { name: "/trip list", desc: "登録済みトリップの一覧を確認する。", restricted:true },
      { name: "/trip reset 名前", desc: "対象のトリップ登録をリセットする。", restricted:true },
      { name: "/army kick 名前", desc: "対象を国民名簿から除名する。", restricted:true },
      { name: "/say 発言内容", desc: "皇帝として全体チャットへ発言する。", restricted:true },
      { name: "/alarm_clear", desc: "設定中の全アラームを削除する。", restricted:true },
    ]
  },
];

const container = document.getElementById('ministries');
const noResult  = document.getElementById('noResult');
const dateSpan  = document.getElementById('issueDate');

dateSpan.textContent = "発行日：" + new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });

DATA.forEach(function(ministry, mi){
  const section = document.createElement('section');
  section.className = 'ministry';
  section.dataset.index = mi;

  const head = document.createElement('div');
  head.className = 'ministry-head';
  head.innerHTML =
    '<span class="ministry-no">第' + ministry.no + '部</span>' +
    '<h2 class="ministry-name">' + ministry.name + (ministry.restricted ? ' <span class="badge">権限要</span>' : '') + '</h2>';
  section.appendChild(head);

  const desc = document.createElement('p');
  desc.className = 'ministry-desc';
  desc.textContent = ministry.desc;
  section.appendChild(desc);

  const list = document.createElement('div');
  list.className = 'cmd-list';

  ministry.cmds.forEach(function(cmd){
    const row = document.createElement('div');
    row.className = 'cmd-row' + (cmd.restricted ? ' restricted' : '');
    row.dataset.search = (cmd.name + ' ' + cmd.desc + ' ' + (cmd.ex||'')).toLowerCase();
    row.innerHTML =
      '<div><span class="cmd-name">' + cmd.name + '</span></div>' +
      '<div class="cmd-body">' +
        '<span class="cmd-desc">' + cmd.desc + '</span>' +
        (cmd.ex ? '<span class="cmd-example">' + cmd.ex + '</span>' : '') +
      '</div>';
    list.appendChild(row);
  });

  section.appendChild(list);
  container.appendChild(section);
});

const input = document.getElementById('searchInput');
const countEl = document.getElementById('searchCount');

function applyFilter(){
  const q = input.value.trim().toLowerCase();
  let visibleTotal = 0;

  document.querySelectorAll('.ministry').forEach(function(section){
    let visibleInSection = 0;
    section.querySelectorAll('.cmd-row').forEach(function(row){
      const match = !q || row.dataset.search.includes(q);
      row.classList.toggle('is-hidden', !match);
      if (match) visibleInSection++;
    });
    section.classList.toggle('is-empty', visibleInSection === 0);
    visibleTotal += visibleInSection;
  });

  noResult.style.display = visibleTotal === 0 ? 'block' : 'none';
  countEl.textContent = q ? (visibleTotal + '件 該当') : '';
}

input.addEventListener('input', applyFilter);
applyFilter();
</script>
