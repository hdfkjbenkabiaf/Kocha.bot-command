<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大紅茶帝国 勅令書 ― Bot コマンド一覧</title>
<style>
  :root{
    --bg:#150f0c;
    --panel:#1f1611;
    --panel2:#291d16;
    --border:#4a3527;
    --border-soft:#332419;
    --gold:#c9a24b;
    --gold-bright:#e8c274;
    --seal:#8f2a2a;
    --seal-bright:#b23a3a;
    --text:#ece0c9;
    --text-muted:#a3907a;
    --text-dim:#7a695a;
    --serif: "Yu Mincho","Hiragino Mincho ProN","Noto Serif JP","Shippori Mincho",serif;
    --sans: "Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
    --mono: "SFMono-Regular","Menlo","Consolas",monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(201,162,75,0.08), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(143,42,42,0.10), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    line-height:1.6;
  }
  a{color:inherit;}

  /* ===== header ===== */
  header{
    position:relative;
    padding:64px 24px 40px;
    text-align:center;
    border-bottom:1px solid var(--border-soft);
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(90deg, rgba(201,162,75,0.035) 0px, rgba(201,162,75,0.035) 1px, transparent 1px, transparent 64px);
    pointer-events:none;
  }
  .seal{
    width:84px;height:84px;
    margin:0 auto 22px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--seal-bright), var(--seal) 70%, #5e1c1c 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);
    font-size:36px;
    font-weight:700;
    color:#f3d9a8;
    box-shadow:0 0 0 2px rgba(201,162,75,0.4), 0 0 24px rgba(143,42,42,0.5), inset 0 0 14px rgba(0,0,0,0.35);
    transform:rotate(-6deg);
    letter-spacing:-2px;
  }
  h1{
    font-family:var(--serif);
    font-size:clamp(28px,5vw,44px);
    font-weight:700;
    letter-spacing:.06em;
    margin:0 0 10px;
    color:var(--gold-bright);
    text-shadow:0 0 30px rgba(201,162,75,0.25);
  }
  header p.sub{
    font-family:var(--serif);
    color:var(--text-muted);
    font-size:15px;
    max-width:560px;
    margin:0 auto;
    letter-spacing:.03em;
  }
  .eventnote{
    display:inline-block;
    margin-top:22px;
    padding:8px 18px;
    border:1px solid rgba(201,162,75,0.4);
    border-radius:999px;
    font-size:13px;
    color:var(--gold);
    background:rgba(201,162,75,0.06);
  }

  /* ===== search ===== */
  .searchbar{
    max-width:640px;
    margin:34px auto 0;
    padding:0 24px;
  }
  .searchbar input{
    width:100%;
    padding:14px 18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-size:15px;
    font-family:var(--sans);
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .searchbar input:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,75,0.15);
  }
  .searchbar input::placeholder{color:var(--text-dim);}
  #noresult{
    display:none;
    text-align:center;
    color:var(--text-dim);
    font-family:var(--serif);
    padding:60px 20px;
  }

  /* ===== nav chips ===== */
  nav.toc{
    max-width:1040px;
    margin:26px auto 0;
    padding:0 24px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }
  nav.toc a{
    text-decoration:none;
    font-size:12.5px;
    color:var(--text-muted);
    border:1px solid var(--border-soft);
    padding:6px 12px;
    border-radius:999px;
    white-space:nowrap;
    transition:border-color .15s, color .15s;
  }
  nav.toc a:hover{ color:var(--gold-bright); border-color:var(--gold); }

  /* ===== main ===== */
  main{
    max-width:1040px;
    margin:0 auto;
    padding:50px 24px 100px;
  }
  section.category{
    margin-bottom:46px;
  }
  .cat-head{
    display:flex;
    align-items:baseline;
    gap:14px;
    margin-bottom:6px;
    padding-bottom:12px;
    border-bottom:1px solid var(--border-soft);
  }
  .cat-num{
    font-family:var(--serif);
    font-size:13px;
    color:var(--seal-bright);
    border:1px solid rgba(143,42,42,0.5);
    border-radius:50%;
    width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .cat-head h2{
    font-family:var(--serif);
    font-size:20px;
    font-weight:700;
    margin:0;
    color:var(--gold-bright);
    letter-spacing:.04em;
  }
  .cat-head .cat-desc{
    font-size:12.5px;
    color:var(--text-dim);
    margin-left:auto;
    text-align:right;
  }

  .cmd-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:10px;
    margin-top:18px;
  }
  .cmd-card{
    background:var(--panel);
    border:1px solid var(--border-soft);
    border-radius:10px;
    padding:14px 16px;
    transition:border-color .15s, transform .15s, background .15s;
  }
  .cmd-card:hover{
    border-color:var(--gold);
    background:var(--panel2);
  }
  .cmd-card .syntax{
    font-family:var(--mono);
    font-size:13px;
    color:var(--gold-bright);
    display:block;
    margin-bottom:6px;
    word-break:break-word;
  }
  .cmd-card .syntax .arg{
    color:var(--text-muted);
    font-style:italic;
  }
  .cmd-card .desc{
    font-size:12.8px;
    color:var(--text-muted);
    margin:0;
  }
  .tag{
    display:inline-block;
    font-size:10px;
    padding:2px 7px;
    border-radius:999px;
    margin-left:6px;
    vertical-align:middle;
    letter-spacing:.02em;
  }
  .tag.admin{ background:rgba(143,42,42,0.18); color:#e39a9a; border:1px solid rgba(143,42,42,0.5); }
  .tag.trip{ background:rgba(201,162,75,0.14); color:var(--gold); border:1px solid rgba(201,162,75,0.4); }
  .tag.event{ background:rgba(90,150,110,0.14); color:#8fd3a4; border:1px solid rgba(90,150,110,0.4); }

  footer{
    text-align:center;
    padding:40px 24px 60px;
    color:var(--text-dim);
    font-size:12px;
    font-family:var(--serif);
    border-top:1px solid var(--border-soft);
  }

  @media (max-width:600px){
    .cat-head{flex-wrap:wrap;}
    .cat-head .cat-desc{margin-left:0; text-align:left;}
  }
</style>
</head>
<body>

<header>
  <div class="seal">茶</div>
  <h1>大紅茶帝国 勅令書</h1>
  <p class="sub">紅茶皇帝直属Botの全コマンドを、この一巻にまとめる。検索窓に打ち込めば目当ての勅令へすぐ辿り着ける。</p>
  <div class="eventnote">七夕限定：7/7〜7/14は /relic で限定レリックも出現中</div>
</header>

<div class="searchbar">
  <input id="search" type="text" placeholder="コマンドや効果で検索（例: 借金 / relic / 送金）" autocomplete="off">
</div>

<nav class="toc" id="toc"></nav>

<main id="main">
  <p id="noresult">該当する勅令は見当たらぬ…綴りを確かめよ。</p>
</main>

<footer>大紅茶帝国情報局 発行 ／ このコマンド一覧はBot本体のコード更新に合わせて随時改訂される</footer>

<script>
const DATA = [
  {
    title: "基本",
    desc: "誰でも使える雑談系",
    items: [
      { cmd: "/omikuji", desc: "今日の運勢を占う。大吉〜大凶の7段階。" },
      { cmd: "/time", desc: "現在時刻を表示する。" },
      { cmd: "/alarm <span class='arg'>分</span>", desc: "指定した分後にチャットで呼びかけてくれる。例：/alarm 10" },
      { cmd: "/dice", desc: "1〜6のダイスを振る。" },
      { cmd: "/ad", desc: "皇帝の宣伝広告を手動で流す（通常は30分ごとに自動投稿）。" }
    ]
  },
  {
    title: "治安・入国管理",
    desc: "キック / 入国禁止",
    items: [
      { cmd: "/kick <span class='arg'>名前</span>", desc: "対象を処刑（キック）する。", tags:["trip"], tagLabel:"RM・モデレーター専用" },
      { cmd: "/ban <span class='arg'>名前</span>", desc: "入国禁止リストに追加。次回入室時に即追放される。", tags:["admin"] },
      { cmd: "/unban <span class='arg'>名前</span>", desc: "入国禁止を解除する。", tags:["admin"] },
      { cmd: "/banlist", desc: "現在の入国禁止者一覧を表示。", tags:["admin"] }
    ]
  },
  {
    title: "国民システム",
    desc: "大紅茶帝国への登録",
    items: [
      { cmd: "/army", desc: "国民一覧を表示する。" },
      { cmd: "/army join", desc: "国民として登録する。◆から始まる本物のトリップが必須（素酉不可）。" },
      { cmd: "/army kick <span class='arg'>名前</span>", desc: "国民リストから除名する。", tags:["admin"] }
    ]
  },
  {
    title: "就職・労働",
    desc: "会社に入ってお金を稼ぐ",
    items: [
      { cmd: "/companies", desc: "応募できる会社の一覧（バイト5社・正社員9社）を表示。" },
      { cmd: "/job <span class='arg'>会社ID</span>", desc: "指定した会社に応募する。不合格だと再挑戦にバイト30分・正社員1時間のクールタイム。" },
      { cmd: "/work", desc: "働いて給料を得る。クールタイムは基本10分（紅茶バフや住居・遺物で短縮可）。失敗すると罰金、まれにクビになる。" },
      { cmd: "/myjob", desc: "現在の勤務先と次に /work できるまでの時間を確認。" },
      { cmd: "/resign", desc: "今の会社を退職する。" }
    ]
  },
  {
    title: "遺物探索",
    desc: "/relic で歴史的遺物を収集",
    items: [
      { cmd: "/relic", desc: "遺物を探索する。約3%でトラップにかかり治療費を失う（お守り・王冠で軽減）。★〜★★★★★・SECRET・Eternalまで存在。" },
      { cmd: "/relicdex", desc: "通常の遺物図鑑を確認する。" },
      { cmd: "/tanabatadex", desc: "七夕限定レリックの図鑑（通常図鑑とは別集計）。7/7〜7/14の期間中は /relic からも限定枠が出現する。", tags:["event"] },
      { cmd: "/profile", desc: "所持遺物数・住居・称号などをまとめて確認。" },
      { cmd: "/rank", desc: "遺物保有数ランキングTOP5。" },
      { cmd: "/museum", desc: "自分が集めた遺物を博物館形式で一覧表示。" }
    ]
  },
  {
    title: "称号",
    desc: "実績を満たすと自動で獲得",
    items: [
      { cmd: "/titlelist", desc: "獲得済みの称号一覧。装備中の称号に★マークが付く。" },
      { cmd: "/titleset <span class='arg'>称号名</span>", desc: "獲得済みの称号をプロフィールに装備する。" },
      { cmd: "/titleclear", desc: "装備中の称号を解除する。" },
      { cmd: "/titledex", desc: "全称号とその獲得条件の一覧（未獲得は条件が見える）。" }
    ]
  },
  {
    title: "所持金・送金",
    desc: "基本の経済コマンド",
    items: [
      { cmd: "/money", desc: "自分の所持金を確認。" },
      { cmd: "/money rank", desc: "資産（所持金+預金）ランキングTOP10。" },
      { cmd: "/send <span class='arg'>名前</span> <span class='arg'>金額</span>", desc: "送金する。手数料5%、同じ相手には1時間3回まで、登録から24時間は送金不可、相手の受取上限は1日5万円。" },
      { cmd: "/send <span class='arg'>金額</span> all", desc: "国民全員に一律配布する。", tags:["admin"] }
    ]
  },
  {
    title: "銀行・ショップ・株・資源",
    desc: "預金／買い物／投資",
    items: [
      { cmd: "/deposit <span class='arg'>金額</span>", desc: "銀行に預金する。毎日+100円の利息が付く。" },
      { cmd: "/refund <span class='arg'>金額</span>", desc: "預金を引き出す。" },
      { cmd: "/bank", desc: "預金残高・所持金・預入からの日数を確認。" },
      { cmd: "/bet <span class='arg'>金額</span>", desc: "シンプルな賭け。金額が大きいほど勝率は下がる。" },
      { cmd: "/shop", desc: "商店の商品一覧（スクラッチ宝くじ・弁当・紅茶）。" },
      { cmd: "/buy <span class='arg'>商品名</span> <span class='arg'>個数</span>", desc: "ショップの商品を購入する（銘柄名を指定すると株の購入にもなる）。" },
      { cmd: "/stock [<span class='arg'>セクター</span>]", desc: "株価一覧を表示。セクター名を付けると絞り込み。" },
      { cmd: "/sell <span class='arg'>銘柄ID</span> <span class='arg'>株数</span>", desc: "保有株を売却する。" },
      { cmd: "/portfolio", desc: "保有株と年間配当見込みを確認（配当は10分ごとに嘆きで自動受取）。" },
      { cmd: "/resource", desc: "金・銀・原油などの資源価格一覧。" },
      { cmd: "/buyresource <span class='arg'>資源ID</span> <span class='arg'>個数</span>", desc: "資源を購入する。" },
      { cmd: "/sellresource <span class='arg'>資源ID</span> <span class='arg'>個数</span>", desc: "資源を売却する。" },
      { cmd: "/resourceportfolio", desc: "保有資源と評価額の一覧。" }
    ]
  },
  {
    title: "借金",
    desc: "日利30%複利。計画的に。",
    items: [
      { cmd: "/loan <span class='arg'>金額</span>", desc: "帝国銀行から借金する。上限10万円、日利30%複利。返済が遅れるほどペナルティ段階（Lv1〜5）が進む。" },
      { cmd: "/loanreturn <span class='arg'>金額</span>", desc: "借金を返済する。" },
      { cmd: "/loanstatus", desc: "借金残高とペナルティ段階を確認。" }
    ]
  },
  {
    title: "カジノ",
    desc: "運試し（借金Lv2以上は利用不可）",
    items: [
      { cmd: "/casino", desc: "カジノの全ゲームの遊び方を説明。" },
      { cmd: "/roulette <span class='arg'>金額</span> <span class='arg'>赤|黒|緑|数字</span>", desc: "ルーレット。赤黒は2倍、数字・緑ピタリは35倍。" },
      { cmd: "/poker <span class='arg'>金額</span>", desc: "5枚配って役を判定。ロイヤルフラッシュで100倍。" },
      { cmd: "/blackjack <span class='arg'>金額</span>", desc: "21を目指すブラックジャック。BJ成立で1.5倍。" },
      { cmd: "/slot <span class='arg'>金額</span>", desc: "3つ揃いで大当たり。DIA揃いは50倍。" }
    ]
  },
  {
    title: "住居",
    desc: "住むと仕事収入や/workのCDが優遇される",
    items: [
      { cmd: "/housing", desc: "賃貸・持ち家の物件一覧を表示。" },
      { cmd: "/rent <span class='arg'>住居ID</span>", desc: "賃貸物件に入居する。" },
      { cmd: "/home buy <span class='arg'>住居ID</span>", desc: "持ち家を購入する（ローンなし一括）。" },
      { cmd: "/moveout", desc: "賃貸物件を退去する（持ち家は退去不可）。" },
      { cmd: "/myhouse", desc: "現在の住居と優遇内容を確認。" }
    ]
  },
  {
    title: "競馬",
    desc: "30分ごとに自動開催",
    items: [
      { cmd: "/race", desc: "出走馬とオッズ、次のレースまでの時間を表示。" },
      { cmd: "/racebet <span class='arg'>賭け方</span> <span class='arg'>馬番...</span> <span class='arg'>金額</span>", desc: "馬券を購入する。単勝／複勝／馬連／三連単。例：/racebet 単勝 3 1000" }
    ]
  },
  {
    title: "管理者専用",
    desc: "紅茶皇帝のみ実行可能",
    items: [
      { cmd: "/say <span class='arg'>本文</span>", desc: "Botに任意の発言をさせる。", tags:["admin"] },
      { cmd: "/alarm_clear", desc: "予約中の全アラームを削除する。", tags:["admin"] },
      { cmd: "/grantmod <span class='arg'>名前</span>", desc: "モデレーター権限（/kick可）を付与する。", tags:["admin"] },
      { cmd: "/revokemod <span class='arg'>名前</span>", desc: "モデレーター権限を剥奪する。", tags:["admin"] },
      { cmd: "/modlist", desc: "モデレーター一覧を表示。", tags:["admin"] },
      { cmd: "/confiscate <span class='arg'>名前</span>", desc: "対象の所持金・預金を全額没収する。", tags:["admin"] },
      { cmd: "/datamigrate <span class='arg'>旧名前</span> <span class='arg'>新名前</span>", desc: "アカウント名を変更した際に、全データ（所持金・遺物・住居など）を引き継ぐ。", tags:["admin"] },
      { cmd: "/trip list", desc: "登録済みトリップの一覧を表示。", tags:["admin"] },
      { cmd: "/trip reset <span class='arg'>名前</span>", desc: "対象のトリップ登録を消去する。トリップ不一致で誤キックされる場合の修正に使う。", tags:["admin"] }
    ]
  }
];

const main = document.getElementById('main');
const toc = document.getElementById('toc');
const noresult = document.getElementById('noresult');

DATA.forEach((cat, i) => {
  const a = document.createElement('a');
  a.href = '#cat' + i;
  a.textContent = cat.title;
  toc.appendChild(a);

  const section = document.createElement('section');
  section.className = 'category';
  section.id = 'cat' + i;
  section.dataset.title = cat.title;

  const head = document.createElement('div');
  head.className = 'cat-head';
  head.innerHTML = `<span class="cat-num">${i+1}</span><h2>${cat.title}</h2><span class="cat-desc">${cat.desc}</span>`;
  section.appendChild(head);

  const grid = document.createElement('div');
  grid.className = 'cmd-grid';

  cat.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'cmd-card';
    card.dataset.search = (item.cmd + ' ' + item.desc).replace(/<[^>]+>/g,'').toLowerCase();
    let tagsHtml = '';
    if (item.tags) {
      item.tags.forEach(t => {
        const label = t === 'admin' ? '管理者' : t === 'trip' ? (item.tagLabel || 'モデレーター') : t === 'event' ? '期間限定' : t;
        tagsHtml += `<span class="tag ${t}">${label}</span>`;
      });
    }
    card.innerHTML = `<span class="syntax">${item.cmd}${tagsHtml}</span><p class="desc">${item.desc}</p>`;
    grid.appendChild(card);
  });

  section.appendChild(grid);
  main.appendChild(section);
});

const searchInput = document.getElementById('search');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('section.category').forEach(section => {
    let sectionHasMatch = false;
    section.querySelectorAll('.cmd-card').forEach(card => {
      const match = !q || card.dataset.search.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) sectionHasMatch = true;
    });
    section.style.display = sectionHasMatch ? '' : 'none';
    if (sectionHasMatch) anyVisible = true;
  });
  noresult.style.display = anyVisible ? 'none' : 'block';
});
</script>

</body>
</html>
